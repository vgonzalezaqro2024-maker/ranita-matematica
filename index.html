<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranita Matemática</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section id="registro" class="pantalla activa">
<div class="card">
<h2>Registro</h2>
<input id="nombre" placeholder="Nombre completo">
<input id="edad" type="number" placeholder="Edad">
<button onclick="irDificultad()">Continuar</button>
</div>
</section>

<section id="dificultad" class="pantalla">
<div class="card">
<h2>Nivel de dificultad</h2>
<button onclick="guardarDificultad('Fácil')">🟢 Fácil</button>
<button onclick="guardarDificultad('Intermedio')">🟡 Intermedio</button>
<button onclick="guardarDificultad('Difícil')">🔴 Difícil</button>
</div>
</section>

<section id="avatar" class="pantalla">
<div class="card">
<h2>Personaliza tu avatar</h2>
<select id="avatarSelect">
<option>🐸</option>
<option>🐸👑</option>
<option>🐸🎩</option>
<option>🐸🧢</option>
</select>
<button onclick="iniciarJuego()">Comenzar Juego</button>
</div>
</section>

<section id="juego" class="pantalla">
<div class="card">
<h2 id="info"></h2>
<p>Esta es la pantalla del juego.</p>
<div class="game-header">
    <button id="rollDiceBtn">🎲 Lanzar dado</button>
</div>

<div id="questionContainer"></div>

<div id="boardContainer">
    <!-- Tablero -->
</div>
</div>
</section>

<script src="script.js"></script>
</body>
</html>
